<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; background: #111; font-family: system-ui, sans-serif; color: #eee; }
    canvas { display: block; }
    #loading, #error {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 16px;
      background: #111; z-index: 10;
    }
    #error { display: none; color: #e07070; font-size: 13px; }
    #loading { color: #888; font-size: 13px; }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid #2a2a2a; border-top-color: #5b9bd5;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #hint {
      position: fixed; bottom: 14px; right: 14px; font-size: 11px;
      color: rgba(255,255,255,0.25); pointer-events: none; user-select: none;
      text-align: right; line-height: 1.8; display: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="loading">
    <div class="spinner"></div>
    <span>Loading model...</span>
  </div>
  <div id="error"></div>
  <div id="hint">
    Left drag: orbit<br>
    Right drag: pan<br>
    Scroll: zoom
  </div>
  <script src="views://viewer-ui/index.js"></script>
</body>
</html>
